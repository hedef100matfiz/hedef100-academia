<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş | Hedef100 Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #f8fafc 1px, transparent 1px), linear-gradient(to bottom, #f8fafc 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 selection:bg-orange-500 selection:text-white min-h-screen flex items-center justify-center relative">

    <div class="absolute inset-0 bg-grid-pattern opacity-60 pointer-events-none"></div>

    <div class="container mx-auto px-4 z-10 flex justify-center">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl border border-orange-100 w-full max-w-md relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-orange-600"></div>

            <div class="text-center mb-8 mt-2">
                <a href="index.html" class="text-3xl font-extrabold tracking-tighter text-slate-900 block mb-2">
                    HEDEF100<span class="text-orange-500">.ACADEMIA</span>
                </a>
                <h1 class="text-lg font-semibold text-slate-600">Öğrenci Yönetim Paneli</h1>
                <p class="text-sm text-slate-400 mt-1">Sisteme giriş yapmak için bilgilerinizi girin.</p>
            </div>

            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';" class="space-y-6">
                <div>
                    <label for="student_id" class="block text-sm font-bold text-slate-700 mb-2">TC Kimlik / Öğrenci Numarası</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="student_id" name="student_id" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="Örn: 12345678910" required>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-bold text-slate-700">Şifre</label>
                        <a href="#" class="text-sm font-semibold text-orange-500 hover:text-orange-600 transition-colors">Şifremi Unuttum</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 text-orange-500 focus:ring-orange-500 border-slate-300 rounded cursor-pointer">
                    <label for="remember_me" class="ml-2 block text-sm text-slate-600 cursor-pointer">
                        Beni Hatırla
                    </label>
                </div>

                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-[0_4px_14px_0_rgba(249,115,22,0.39)] transform hover:-translate-y-0.5">
                    Giriş Yap
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-500">
                <p>Henüz kayıtlı değil misiniz?</p>
                <a href="#" class="font-bold text-slate-800 hover:text-orange-500 transition-colors mt-1 inline-block">Koçluk Başvurusu Yapın</a>
            </div>

        </div>
    </div>

</body>
</html>
