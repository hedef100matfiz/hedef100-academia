<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş | Hedef100 Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-grid-pattern {
            background-image: linear-gradient(to right, #f8fafc 1px, transparent 1px), linear-gradient(to bottom, #f8fafc 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col relative selection:bg-orange-500 selection:text-white">

    <div class="absolute inset-0 bg-grid-pattern opacity-60 pointer-events-none"></div>

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 shadow-sm py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-slate-900">
                HEDEF100<span class="text-orange-500">.ACADEMIA</span>
            </a>
            <span class="text-xs font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full border border-slate-200">Eğitim SaaS Platformu</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12 z-10 flex-1 flex justify-center items-center">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl border border-orange-100 w-full max-w-md relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 via-indigo-500 to-blue-500"></div>

            <div class="text-center mb-8 mt-2">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Tekrar Hoş Geldin</h1>
                <p class="text-sm text-slate-500 mt-2">Sisteme giriş yapacağınız yetkiyi seçin.</p>
            </div>

            <div class="flex p-1 mb-6 space-x-1 bg-slate-100 rounded-xl">
                <button id="student-tab" onclick="switchRole('student')" class="w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-orange-500 text-white shadow-sm transition-all focus:outline-none">Öğrenci</button>
                <button id="teacher-tab" onclick="switchRole('teacher')" class="w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-transparent text-slate-600 hover:text-slate-800 transition-all focus:outline-none">Eğitmen</button>
                <button id="kurum-tab" onclick="switchRole('kurum')" class="w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-transparent text-slate-600 hover:text-slate-800 transition-all focus:outline-none">Kurum</button>
            </div>

            <form onsubmit="handleLogin(event)">
                <div>
                    <label id="identifier-label" class="block text-sm font-bold text-slate-700 mb-2">Hedef ID, E-posta veya Telefon</label>
                    <input type="text" id="loginIdentifier" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-colors text-sm" placeholder="H100-XXXX veya ornek@email.com" required>
                </div>

                <div class="mt-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-slate-700">Şifre</label>
                        <a href="#" onclick="alert('Şifre sıfırlama bağlantısı demo sürümünde aktif değildir.')" class="text-xs font-semibold text-slate-400 hover:text-orange-500 transition-colors">Şifremi Unuttum</a>
                    </div>
                    <input type="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-colors text-sm" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-lg shadow-orange-500/30 transform hover:-translate-y-0.5 mt-6 text-sm">
                    Öğrenci Olarak Giriş Yap
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-500">
                <p>Platformda henüz hesabın yok mu?</p>
                <a href="register.html" class="font-bold text-slate-900 hover:text-orange-500 transition-colors mt-1 inline-block">Hemen Kayıt Ol</a>
            </div>

        </div>
    </div>

    <script>
        let currentRole = 'student';

        // GÜNCELLENEN KISIM: 3 role göre tasarım ve buton metni değişimi
        function switchRole(role) {
            currentRole = role;
            const studentTab = document.getElementById('student-tab');
            const teacherTab = document.getElementById('teacher-tab');
            const kurumTab = document.getElementById('kurum-tab');
            const submitBtn = document.getElementById('submitBtn');
            const inputField = document.getElementById('loginIdentifier');
            const identifierLabel = document.getElementById('identifier-label');

            // Tüm sekmeleri sıfırla
            studentTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-transparent text-slate-600 hover:text-slate-800 transition-all focus:outline-none";
            teacherTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-transparent text-slate-600 hover:text-slate-800 transition-all focus:outline-none";
            kurumTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-transparent text-slate-600 hover:text-slate-800 transition-all focus:outline-none";

            if(role === 'student') {
                studentTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-orange-500 text-white shadow-sm transition-all focus:outline-none";
                submitBtn.className = "w-full bg-orange-500 hover:bg-orange-600 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-lg shadow-orange-500/30 transform hover:-translate-y-0.5 mt-6 text-sm";
                submitBtn.innerText = "Öğrenci Olarak Giriş Yap";
                inputField.className = "w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-colors text-sm";
                identifierLabel.innerText = "Hedef ID veya E-posta";
                inputField.placeholder = "H100-XXXX veya ornek@email.com";
            } else if (role === 'teacher') {
                teacherTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-slate-800 text-white shadow-sm transition-all focus:outline-none";
                submitBtn.className = "w-full bg-slate-800 hover:bg-slate-900 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-lg transform hover:-translate-y-0.5 mt-6 text-sm";
                submitBtn.innerText = "Eğitmen Olarak Giriş Yap";
                inputField.className = "w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition-colors text-sm";
                identifierLabel.innerText = "Eğitmen ID veya E-posta";
                inputField.placeholder = "TCHR-XXXX veya ornek@email.com";
            } else if (role === 'kurum') {
                kurumTab.className = "w-full py-2.5 text-xs sm:text-sm font-bold rounded-lg bg-blue-600 text-white shadow-sm transition-all focus:outline-none";
                submitBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/30 transform hover:-translate-y-0.5 mt-6 text-sm";
                submitBtn.innerText = "Kurum Olarak Giriş Yap";
                inputField.className = "w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none transition-colors text-sm";
                identifierLabel.innerText = "Kurum Kodu veya E-posta";
                inputField.placeholder = "KURUM-XXXX veya kurum@email.com";
            }
        }

        // GÜNCELLENEN KISIM: Role göre 3 farklı sayfaya yönlendirme
        function handleLogin(event) {
            event.preventDefault();
            
            if(currentRole === 'student') {
                window.location.href = 'dashboard.html';
            } else if (currentRole === 'teacher') {
                window.location.href = 'teacher-dashboard.html';
            } else if (currentRole === 'kurum') {
                window.location.href = 'kurum-dashboard.html';
            }
        }
    </script>
</body>
</html>
