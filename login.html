        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');

            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (tab === 'login') {

                registerContainer.className = "form-section hidden-form";

                loginForm.className = "form-section hidden-form space-y-4";

            activeBtn.className = "py-1.5 text-[10px] font-bold rounded bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 transition-all shadow-sm";
        }

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const particleCount = window.innerWidth < 768 ? 100 : 180;
        let rotationX = 0, rotationY = 0;
        let targetRotationX = 0, targetRotationY = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: (Math.random() - 0.5) * 600, y: (Math.random() - 0.5) * 600, z: (Math.random() - 0.5) * 600
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            targetRotationY += 0.003; 
            rotationX += (targetRotationX - rotationX) * 0.05;
            rotationY += (targetRotationY - rotationY) * 0.05;

            const cosX = Math.cos(rotationX), sinX = Math.sin(rotationX);
            const cosY = Math.cos(rotationY), sinY = Math.sin(rotationY);

            let transformed = particles.map(p => {
                let x1 = p.x * cosY - p.z * sinY;
                let z1 = p.x * sinY + p.z * cosY;
                let y2 = p.y * cosX - z1 * sinX;
                let z2 = p.y * sinX + z1 * cosX;
                return { x: x1, y: y2, z: z2 };
            });

            transformed.forEach((p) => {
                let perspective = 1000 / (1000 - p.z);
                let x = p.x * perspective + width / 2;
                let y = p.y * perspective + height / 2;
                let size = Math.max(0.5, 2.5 * perspective);
                let alpha = Math.min(1, Math.max(0.1, (p.z + 300) / 600));

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(99, 102, 241, ${alpha})`;
                ctx.fill();
            });

            ctx.lineWidth = 0.5;
            for (let i = 0; i < transformed.length; i++) {
                for (let j = i + 1; j < transformed.length; j++) {
                    let d = Math.hypot(transformed[i].x - transformed[j].x, transformed[i].y - transformed[j].y, transformed[i].z - transformed[j].z);
                    if (d < 110) {
                        let alphaLine = (110 - d) / 110 * 0.4;
                        let perspectiveI = 1000 / (1000 - transformed[i].z);
                        let perspectiveJ = 1000 / (1000 - transformed[j].z);
                        
                        let xi = transformed[i].x * perspectiveI + width / 2;
                        let yi = transformed[i].y * perspectiveI + height / 2;
                        let xj = transformed[j].x * perspectiveJ + width / 2;
                        let yj = transformed[j].y * perspectiveJ + height / 2;

                        ctx.beginPath();
                        ctx.moveTo(xi, yi);
                        ctx.lineTo(xj, yj);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${alphaLine})`;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            targetRotationX = ((e.clientY / window.innerHeight) - 0.5) * 0.5;
        });

        window.addEventListener('resize', init);
        init();
        draw();
    </script>

        // --- GİRİŞ YAPMA İŞLEMİ ---

                    btn.classList.replace('bg-indigo-600', 'bg-emerald-600');

                    setTimeout(() => {

                        else if (role === 'kurum') window.location.href = 'kurum-dashboard.html';

        // --- 3'LÜ KAYIT OLMA İŞLEMİ ---
        function generateHedefId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = 'H100-';
            for(let i=0; i<4; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
            return id;
        }

        window.handleRegistration = async function(e, role) {
            e.preventDefault();
            
            let firstName = "", lastName = "", email = "", password = "", specialty = "";
            let btn;

            // İlgili Formdan Verileri Çek
            if(role === 'student') {
                firstName = document.getElementById('sAd').value.trim();
                lastName = document.getElementById('sSoyad').value.trim();
                email = document.getElementById('sEmail').value.trim();
                password = document.getElementById('sPass').value.trim();
                specialty = document.getElementById('sSinav').value;
                btn = document.getElementById('btnSubmitStudent');
            } 
            else if(role === 'teacher') {
                firstName = document.getElementById('tAd').value.trim();
                lastName = document.getElementById('tSoyad').value.trim();
                email = document.getElementById('tEmail').value.trim();
                password = document.getElementById('tPass').value.trim();
                specialty = document.getElementById('tBrans').value;
                btn = document.getElementById('btnSubmitTeacher');
            }

                lastName = document.getElementById('kYetkili').value.trim(); // Yetkili
                email = document.getElementById('kEmail').value.trim();
                password = document.getElementById('kPass').value.trim();
                specialty = "Kurum Yönetimi";
                btn = document.getElementById('btnSubmitKurum');
            }

            btn.innerText = "Kimlik Oluşturuluyor..."; btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const newHedefId = generateHedefId();

                    uid: userCredential.user.uid,

                    lastName,

                    role,

                    if (role === 'teacher') window.location.href = 'teacher-dashboard.html';
                    else if (role === 'student') window.location.href = 'student-dashboard.html';
                    else if (role === 'kurum') window.location.href = 'kurum-dashboard.html';
                }, 1000);

            } catch (error) {
                let errorMsg = "Kayıt sırasında hata meydana geldi.";
                if(error.code === 'auth/email-already-in-use') errorMsg = "Bu e-posta adresi zaten kullanımda.";
                alert(errorMsg);
                resetBtn(btn, role === 'student' ? "Öğrenci Olarak Katıl" : role === 'teacher' ? "Eğitmen Olarak Kaydol" : "Kurum Profili Oluştur");
            }
        };

        function resetBtn(btn, text) {
            btn.innerText = text; 
            btn.disabled = false;
        }
    </script>
</body>
</html>
