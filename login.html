<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş | Hedef100 Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-grid-pattern { background-image: linear-gradient(to right, #f8fafc 1px, transparent 1px), linear-gradient(to bottom, #f8fafc 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col relative selection:bg-indigo-500 selection:text-white">

    <div class="absolute inset-0 bg-grid-pattern opacity-60 pointer-events-none"></div>

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 shadow-sm py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-slate-900">
                HEDEF100<span class="text-indigo-600">.ACADEMIA</span>
            </a>
            <span class="text-xs font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full border border-slate-200">Giriş Kapısı</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12 z-10 flex-1 flex justify-center items-center">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-100 w-full max-w-md relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-orange-500"></div>

            <div class="text-center mb-8 mt-2">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Tekrar Hoş Geldin</h1>
                <p class="text-sm text-slate-500 mt-2">Akademik gelişim paneline erişmek için bilgilerini gir.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">E-posta Adresi</label>
                    <input type="email" id="email" placeholder="ornek@hedef100.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all" required>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-slate-700">Şifre</label>
                        <a href="#" onclick="alert('Şifre sıfırlama bağlantısı için lütfen sistem yöneticinizle iletişime geçin.')" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">Şifremi Unuttum</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-extrabold py-3.5 rounded-xl transition-all shadow-lg transform hover:-translate-y-0.5 mt-2 text-sm flex justify-center items-center gap-2">
                    <span>Hesabına Giriş Yap</span>
                    <svg id="loadingSpinner" class="animate-spin h-5 w-5 hidden text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                
                <p id="errorMessage" class="text-red-500 text-xs font-bold text-center hidden mt-2"></p>
            </form>

            <div class="mt-8 text-center text-sm text-slate-500 border-t border-slate-100 pt-6">
                <p>Academia ailesine henüz katılmadın mı?</p>
                <a href="register.html" class="font-bold text-indigo-600 hover:text-orange-500 transition-colors mt-1 inline-block">Hemen Ücretsiz Hesap Aç</a>
            </div>
        </div>
    </div>

    <div id="successOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-50 flex items-center justify-center opacity-0 transition-opacity duration-500">
        <div class="text-center transform scale-90 transition-transform duration-500" id="successContent">
            <div class="w-16 h-16 bg-indigo-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl animate-bounce">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-white mb-1">Kimlik Doğrulandı</h2>
            <p id="routingText" class="text-slate-400 text-xs uppercase tracking-widest">Profil verileri yükleniyor...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Yapılandırma Anahtarların
        const firebaseConfig = {
            apiKey: "AIzaSyDvO9NCk8PbDmFxYjVl7HAE8PkjpwCJLaI",
            authDomain: "hedef100-academia.firebaseapp.com",
            projectId: "hedef100-academia",
            storageBucket: "hedef100-academia.firebasestorage.app",
            messagingSenderId: "886084339971",
            appId: "1:886084339971:web:ca31ab9d1575344d234136"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Giriş Tetikleyici Motor
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorMsg = document.getElementById('errorMessage');

            // Arayüzü kilitle ve yükleniyor moduna geç
            spinner.classList.remove('hidden');
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                // 1. Adım: Kullanıcıyı e-posta/şifre ile doğrula
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Adım: Kullanıcının rolünü Firestore veritabanından sorgula
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    const role = userData.role;

                    // Başarı perdesini aç
                    const overlay = document.getElementById('successOverlay');
                    const content = document.getElementById('successContent');
                    const routingText = document.getElementById('routingText');
                    
                    overlay.classList.remove('hidden');
                    setTimeout(() => {
                        overlay.classList.remove('opacity-0');
                        content.classList.remove('scale-90');
                    }, 50);

                    // Rol tabanlı akıllı yönlendirme süzgeci
                    if (role === 'student') {
                        routingText.innerText = "Öğrenci Akademik Paneline Aktarılıyorsunuz...";
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                    } else if (role === 'teacher') {
                        routingText.innerText = "Eğitmen Koordinasyon Paneline Aktarılıyorsunuz...";
                        setTimeout(() => { window.location.href = 'teacher-dashboard.html'; }, 2000);
                    } else if (role === 'kurum') {
                        routingText.innerText = "Kurumsal Yönetim Paneline Aktarılıyorsunuz...";
                        setTimeout(() => { window.location.href = 'kurum-dashboard.html'; }, 2000);
                    } else {
                        routingText.innerText = "Sistem Arayüzüne Yönlendiriliyorsunuz...";
                        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                    }
                } else {
                    throw new Error("Kimlik doğrulandı fakat kullanıcı veritabanı profili eksik!");
                }

            } catch (error) {
                // Hataları yakala ve Türkçeleştirerek ekrana bas
                spinner.classList.add('hidden');
                btn.disabled = false;
                errorMsg.classList.remove('hidden');

                console.error("Giriş Hatası detayları:", error.code);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg.innerText = "Hatalı e-posta adresi veya şifre girdiniz!";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg.innerText = "Çok fazla hatalı deneme yaptınız. Hesabınız geçici olarak kilitlendi!";
                } else {
                    errorMsg.innerText = "Giriş yapılamadı: " + error.message;
                }
            }
        });
    </script>
</body>
</html>
