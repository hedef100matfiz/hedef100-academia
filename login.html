<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Portalı | Hedef100 Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; overflow: hidden; }
        .neon-glow { text-shadow: 0 0 10px rgba(99, 102, 241, 0.5), 0 0 20px rgba(99, 102, 241, 0.3); }
        .hologram-card { backdrop-filter: blur(16px); background-color: rgba(15, 23, 42, 0.45); border: 1px solid rgba(99, 102, 241, 0.15); }
        .hologram-card:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); transition: all 0.5s ease; }
        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 10;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative select-none">

    <div class="scanlines"></div>
    <canvas id="plexusCanvas" class="absolute inset-0 w-full h-full z-0 pointer-events-auto"></canvas>

    <div class="w-full max-w-md mx-4 p-8 rounded-[2.5rem] hologram-card relative z-20 text-center animate-fadeIn">
        
        <div class="mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-700 text-white rounded-2xl flex items-center justify-center font-black text-2xl mx-auto shadow-lg shadow-indigo-500/20">H</div>
            <h1 class="text-2xl font-black text-white mt-4 tracking-tight uppercase">HEDEF100 <span class="text-indigo-400 neon-glow">ACADEMIA</span></h1>
            <p class="text-slate-400 text-xs mt-1 font-medium tracking-wide">Yapay Zeka Destekli Akıllı Eğitim Üssü</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1.5 px-1">E-Posta Adresi</label>
                <input type="email" id="emailInput" placeholder="ornek@hedef100.com" class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white placeholder-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all font-medium" required>
            </div>

            <div class="text-left">
                <label class="block text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1.5 px-1">Giriş Şifresi</label>
                <input type="password" id="passwordInput" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white placeholder-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all font-medium" required>
            </div>

            <div class="flex items-center justify-between text-[11px] font-semibold text-slate-400 px-1 pt-1">
                <label class="flex items-center gap-1.5 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" class="accent-indigo-500 rounded"> Beni Hatırla
                </label>
                <a href="#" class="hover:text-indigo-400 transition-colors">Şifremi Unuttum?</a>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/20 transition-all mt-4">
                Sisteme Güvenli Giriş Yap
            </button>
        </form>

        <div class="mt-8 pt-4 border-t border-slate-900 text-[10px] font-medium text-slate-500 uppercase tracking-wider">
            Quantum Core v2026.1 • Aktif Bağlantı
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plexusCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const mouse = { x: null, y: null, radius: 140 };

        function getParticleCount() {
            if (window.innerWidth < 768) return 40;
            return 100;
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 1.5;
                        this.y += (dy / distance) * force * 1.5;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(129, 140, 248, 0.7)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = getParticleCount();
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(2, 6, 23, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    let maxDist = window.innerWidth < 768 ? 90 : 130;
                    if (dist < maxDist) {
                        let alpha = (maxDist - dist) / maxDist * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }});
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        animate();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvO9NCk8PbDmFxYjVl7HAE8PkjpwCJLaI",
            authDomain: "hedef100-academia.firebaseapp.com",
            projectId: "hedef100-academia",
            storageBucket: "hedef100-academia.firebasestorage.app",
            messagingSenderId: "886084339971",
            appId: "1:886084339971:web:ca31ab9d1575344d234136"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const btn = document.getElementById('loginBtn');

            // UI'ı Yükleniyor durumuna al
            btn.innerText = "Kimlik Doğrulanıyor...";
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // 1. Firebase Auth ile giriş yap
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Firestore'dan kullanıcının rolünü (Öğrenci/Öğretmen/Kurum) öğren
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    const role = userData.role;

                    btn.innerText = "Bağlantı Başarılı!";
                    btn.classList.replace('bg-indigo-600', 'bg-emerald-600');

                    // 3. Rolüne göre doğru panele ışınla
                    setTimeout(() => {
                        if (role === 'teacher') window.location.href = 'teacher-dashboard.html';
                        else if (role === 'student') window.location.href = 'student-dashboard.html';
                        else if (role === 'kurum' || role === 'admin') window.location.href = 'kurum-dashboard.html'; // Dosya isminize göre güncelleyebilirsiniz
                        else alert("Tanımsız hesap türü!");
                    }, 800);

                } else {
                    alert("Giriş yapıldı fakat veritabanında kullanıcı profiliniz bulunamadı.");
                    auth.signOut();
                    resetButton();
                }

            } catch (error) {
                console.error("Giriş Hatası:", error);
                alert("Giriş başarısız. Lütfen e-posta ve şifrenizi kontrol edip tekrar deneyin.");
                resetButton();
            }

            function resetButton() {
                btn.innerText = "Sisteme Güvenli Giriş Yap";
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
