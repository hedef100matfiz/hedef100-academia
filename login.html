<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Portalı | Hedef100 Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; overflow: hidden; }
        /* Hologram ve Parıltı Efektleri */
        .neon-glow { text-shadow: 0 0 10px rgba(99, 102, 241, 0.5), 0 0 20px rgba(99, 102, 241, 0.3); }
        .hologram-card { backdrop-filter: blur(16px); background-color: rgba(15, 23, 42, 0.45); border: 1px solid rgba(99, 102, 241, 0.15); }
        .hologram-card:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); transition: all 0.5s ease; }
        /* Tarama çizgisi (Scanline) efekti */
        .scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: 10;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative select-none">

    <div class="scanlines"></div>

    <canvas id="plexusCanvas" class="absolute inset-0 w-full h-full z-0 pointer-events-auto"></canvas>

    <div class="w-full max-w-md mx-4 p-8 rounded-[2.5rem] hologram-card relative z-20 text-center animate-fadeIn">
        
        <div class="mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-700 text-white rounded-2xl flex items-center justify-center font-black text-2xl mx-auto shadow-lg shadow-indigo-500/20">H</div>
            <h1 class="text-2xl font-black text-white mt-4 tracking-tight uppercase">HEDEF100 <span class="text-indigo-400 neon-glow">ACADEMIA</span></h1>
            <p class="text-slate-400 text-xs mt-1 font-medium tracking-wide">Yapay Zeka Destekli Akıllı Eğitim Üssü</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Komuta Merkezine Bağlanılıyor...');" class="space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1.5 px-1">E-Posta Adresi</label>
                <input type="email" placeholder="ornek@hedef100.com" class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white placeholder-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all font-medium" required>
            </div>

            <div class="text-left">
                <label class="block text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1.5 px-1">Giriş Şifresi</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white placeholder-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all font-medium" required>
            </div>

            <div class="flex items-center justify-between text-[11px] font-semibold text-slate-400 px-1 pt-1">
                <label class="flex items-center gap-1.5 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" class="accent-indigo-500 rounded"> Beni Hatırla
                </label>
                <a href="#" class="hover:text-indigo-400 transition-colors">Şifremi Unuttum?</a>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/20 transition-all mt-4">
                Sisteme Güvenli Giriş Yap
            </button>
        </form>

        <div class="mt-8 pt-4 border-t border-slate-900 text-[10px] font-medium text-slate-500 uppercase tracking-wider">
            Quantum Core v2026.1 • Aktif Bağlantı
        </div>
    </div>

    <script>
        const canvas = document.getElementById('plexusCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const mouse = { x: null, y: null, radius: 140 }; // Etki alanı yarıçapı

        // Ekran boyutuna göre dinamik partikül sayısı hesabı
        function getParticleCount() {
            if (window.innerWidth < 768) return 40; // Mobilde tarayıcıyı yormamak için az partikül
            return 100; // Masaüstünde yoğun plexus ağı
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        // Partikül Sınıfı
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Rastgele yavaş hızlar (Hologram akıcılığı için)
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
            }

            update() {
                // Standart salınım hareketi
                this.x += this.vx;
                this.y += this.vy;

                // Ekrandan taşma kontrolü
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // FARE / DOKUNMATİK ETKİLEŞİMİ (Esnetme Algoritması)
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        // Fareye doğru çekilme kuvveti (Esnek bağ hissiyatı)
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 1.5;
                        this.y += (dy / distance) * force * 1.5;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(129, 140, 248, 0.7)'; // Neon indigo rengi
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = getParticleCount();
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        // Çizgisel Bağları Hesaplayan ve Çizen Ana Döngü
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Arka plana çok hafif fütüristik bir derinlik rengi veriyoruz
            ctx.fillStyle = 'rgba(2, 6, 23, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tüm partikülleri güncelle ve çiz
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Akıllı Plexus Çizgi Bağlantıları (N noktanın birbiriyle olan mesafesi)
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    // Eğer iki partikül birbirine yakınsa aralarına ince bir ışık çizgisi çek
                    let maxDist = window.innerWidth < 768 ? 90 : 130;
                    if (dist < maxDist) {
                        // Yakınlığa göre çizginin opaklığını ayarla (Uzaklaştıkça kaybolur)
                        let alpha = (maxDist - dist) / maxDist * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // DİNLEYİCİLER (MOUSE & TOUCH EVENTS)
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Telefonlar için parmak dokunma desteği
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('resize', resizeCanvas);

        // Motoru Ateşle
        resizeCanvas();
        animate();
    </script>
</body>
</html>
