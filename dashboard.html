    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .bg-grid-pattern { background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px); background-size: 30px 30px; }
        
        .sidebar-expanded { width: 16rem; }
        .sidebar-collapsed { width: 5rem; }
        .hide-text { opacity: 0; display: none; }
        
        .section-hidden { display: none; }
        .section-active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Yükleme Ekranı (Firebase veriyi çekene kadar gösterilir) */
        #pageLoader { z-index: 9999; }
    </style>
</head>
