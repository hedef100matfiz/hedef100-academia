<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitmen Paneli | Hedef100 Academia SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .bg-grid-pattern { background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px); background-size: 30px 30px; }
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 0.3s ease-out, transform 0.3s ease-out; }

        /* Karanlık Mod */
        body.dark-theme { background-color: #0f172a; color: #f8fafc; }
        body.dark-theme .bg-grid-pattern { background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px); }
        body.dark-theme .bg-white { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-theme .text-slate-900 { color: #ffffff !important; }
        body.dark-theme .text-slate-800 { color: #f1f5f9 !important; }
        body.dark-theme .text-slate-700 { color: #e2e8f0 !important; }
        body.dark-theme .text-slate-600 { color: #cbd5e1 !important; }
        body.dark-theme .text-slate-500 { color: #94a3b8 !important; }
        body.dark-theme .bg-slate-50 { background-color: #0f172a !important; border-color: #334155 !important; }
        body.dark-theme .bg-slate-50\/50 { background-color: rgba(15, 23, 42, 0.5) !important; }
        body.dark-theme .border-slate-200, body.dark-theme .border-slate-100 { border-color: #334155 !important; }
        body.dark-theme .divide-slate-100 > :not([hidden]) ~ :not([hidden]) { border-color: #334155 !important; }
        body.dark-theme header { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-theme .modal-bg { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-theme input, body.dark-theme select, body.dark-theme textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        
        /* Renk Düzeltmeleri */
        body.dark-theme .bg-orange-50 { background-color: rgba(249, 115, 22, 0.15) !important; }
        body.dark-theme .bg-indigo-50 { background-color: rgba(99, 102, 241, 0.15) !important; }
        body.dark-theme .bg-emerald-50 { background-color: rgba(16, 185, 129, 0.15) !important; }
        body.dark-theme .bg-blue-50 { background-color: rgba(59, 130, 246, 0.15) !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative flex flex-col" id="mainBody">
    <div class="absolute inset-0 bg-grid-pattern opacity-70 pointer-events-none"></div>

    <!-- Üst Menü -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm transition-colors duration-300">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-orange-500">HEDEF100<span class="text-slate-900">.ACADEMIA</span></a>
                <span class="bg-slate-800 text-white text-xs font-bold px-2.5 py-1 rounded-md shadow-sm">Eğitmen Portalı</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-slate-900 user-name-display">Eğitmen</p>
                    <p class="text-xs text-slate-500 user-id-display font-mono bg-slate-100 px-1.5 py-0.5 rounded mt-0.5 inline-block">H100-XXXX</p>
                </div>
                <div class="user-initials-display w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold shadow-md">EG</div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 flex-1 relative z-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- SOL KOLON -->
        <div class="lg:col-span-2 space-y-8">
            <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden transition-colors">
                <div class="absolute right-0 top-0 w-32 h-32 bg-orange-50 rounded-bl-full -mr-4 -mt-4 opacity-50"></div>
                <h1 class="text-2xl md:text-3xl font-extrabold mb-2 text-slate-900">Hoş Geldin, <span class="user-name-display text-orange-500">Hocam</span>!</h1>
                <p class="text-slate-500 max-w-xl text-sm md:text-base">Sınıflarınızın genel performansı yükseliş trendinde.</p>
            </div>

            <!-- SINIF VE GRUP YÖNETİMİ -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden transition-colors">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-lg font-bold text-slate-900">Sınıflarım & Gruplarım</h2>
                    <button onclick="openModal('createClassModal')" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-200 hover:bg-indigo-100">+ Yeni Sınıf Kur</button>
                </div>
                <!-- Sınıf Listesi Konteyneri -->
                <div class="divide-y divide-slate-100" id="classListContainer">
                    <div class="p-4 md:p-6 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-slate-50 transition-colors group">
                        <div class="flex items-center space-x-4 mb-4 sm:mb-0">
                            <div class="w-12 h-12 bg-gradient-to-br from-orange-400 to-rose-500 text-white rounded-xl flex items-center justify-center font-black text-lg">YKS</div>
                            <div>
                                <h4 class="font-bold text-slate-900 text-base group-hover:text-orange-600">2026 AYT Sayısal Şampiyonlar</h4>
                                <p class="text-xs text-slate-500 mt-1">Sınıf Kodu: <span class="font-mono font-bold text-slate-700 bg-slate-100 px-1 rounded">GRP-X72A</span> • 45 Öğrenci</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="openModal('assignProgramModal')" class="bg-white border border-slate-200 text-slate-700 text-xs font-bold py-2 px-3 rounded-lg">Program Ata</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SAĞ KOLON (Kontroller) -->
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm transition-colors">
                <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3">Komuta Merkezi</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openModal('addStudentByIdModal')" class="flex flex-col items-center justify-center p-4 bg-orange-50 hover:bg-orange-100 border border-orange-100 rounded-xl">
                        <svg class="w-6 h-6 text-orange-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                        <span class="text-xs font-bold text-orange-700">ID ile Ekle</span>
                    </button>
                    <button onclick="openModal('createClassModal')" class="flex flex-col items-center justify-center p-4 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-xl">
                        <svg class="w-6 h-6 text-indigo-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-xs font-bold text-indigo-700">Sınıf Oluştur</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Sınıf Oluşturma Modalı -->
    <div id="createClassModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="modal-bg bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="createClassModalContent">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-50 transition-colors">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div>
                    <h3 class="font-bold text-lg text-indigo-900">Yeni Sınıf Kur</h3>
                </div>
                <button onclick="closeModal('createClassModal')" class="text-slate-400 hover:text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Sınıf / Grup Adı</label>
                    <input type="text" id="classNameInput" class="w-full bg-slate-50 text-slate-800 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-colors" placeholder="Örn: Hafta Sonu AYT Grubu">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Düzey / Sınav</label>
                    <select id="classLevelInput" class="w-full bg-slate-50 text-slate-800 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-colors">
                        <option value="YKS">YKS</option><option value="LGS">LGS</option><option value="KPSS">KPSS</option>
                    </select>
                </div>
                <button onclick="createNewClass()" class="w-full bg-indigo-600 text-white font-extrabold py-3.5 rounded-xl hover:bg-indigo-700 transition shadow-lg mt-2">Sınıfı Oluştur</button>
            </div>
        </div>
    </div>

    <!-- Sınıfa Program Atama Modalı (Göstermelik Hata Vermesin Diye) -->
    <div id="assignProgramModal" class="hidden"><div id="assignProgramModalContent"></div></div>
    <!-- ID ile Ekleme Modalı -->
    <div id="addStudentByIdModal" class="hidden"><div id="addStudentByIdModalContent"></div></div>

    <script>
        // Verileri Çek
        document.addEventListener('DOMContentLoaded', () => {
            const storedName = localStorage.getItem('hedef100_userName') || localStorage.getItem('hedef100_studentName');
            const storedId = localStorage.getItem('hedef100_userId');
            
            if(storedName && storedName.trim() !== '') {
                const nameParts = storedName.trim().split(' ');
                let initials = nameParts[0][0];
                if(nameParts.length > 1) initials += nameParts[nameParts.length - 1][0];
                
                document.querySelectorAll('.user-name-display').forEach(el => el.innerText = storedName);
                document.querySelectorAll('.user-initials-display').forEach(el => el.innerText = initials.toUpperCase());
            }
            if(storedId) {
                document.querySelectorAll('.user-id-display').forEach(el => el.innerText = storedId);
            }
        });

        // Toast Bildirim
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl z-[100] transform transition-all duration-300 translate-y-20 opacity-0 flex items-center gap-3 font-bold text-sm border border-slate-700';
            toast.innerHTML = `<svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-20', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        // Modal Yönetimi
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            if(!modal) return;
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); if(content) content.classList.remove('scale-95'); }, 10);
        }
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + 'Content');
            if(!modal) return;
            modal.classList.add('opacity-0');
            if(content) content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // DİNAMİK SINIF OLUŞTURMA MOTORU
        function createNewClass() {
            const name = document.getElementById('classNameInput').value;
            const level = document.getElementById('classLevelInput').value;
            
            if(!name) {
                showToast('Lütfen bir sınıf adı girin!');
                return;
            }

            // Benzersiz Sınıf Kodu Üret (Örn: GRP-H7X2)
            const randomCode = 'GRP-' + Math.random().toString(36).substring(2,6).toUpperCase();
            
            // Düzeye Göre Renk Ayarla
            let colorFrom = 'from-indigo-400', colorTo = 'to-purple-600', levelShort = level.substring(0,3).toUpperCase();
            if(level === 'LGS') { colorFrom = 'from-emerald-400'; colorTo = 'to-teal-600'; }
            else if(level === 'YKS') { colorFrom = 'from-blue-400'; colorTo = 'to-indigo-500'; }

            // Yeni Sınıfın HTML Şablonu
            const newClassHTML = `
                <div class="p-4 md:p-6 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-slate-50 transition-colors group opacity-0 transform -translate-y-4 duration-500" id="class-${randomCode}">
                    <div class="flex items-center space-x-4 mb-4 sm:mb-0">
                        <div class="w-12 h-12 bg-gradient-to-br ${colorFrom} ${colorTo} text-white rounded-xl flex items-center justify-center font-black text-lg shadow-md">${levelShort}</div>
                        <div>
                            <h4 class="font-bold text-slate-900 text-base group-hover:text-indigo-600 transition-colors">${name}</h4>
                            <p class="text-xs text-slate-500 mt-1">Sınıf Kodu: <span class="font-mono font-bold text-slate-700 bg-slate-100 px-1 rounded">${randomCode}</span> • 0 Öğrenci</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="openModal('assignProgramModal')" class="bg-white border border-slate-200 text-slate-700 hover:text-emerald-600 hover:border-emerald-500 text-xs font-bold py-2 px-3 rounded-lg transition-colors shadow-sm">Program Ata</button>
                    </div>
                </div>
            `;
            
            // Listeye En Üstten Ekle
            const container = document.getElementById('classListContainer');
            container.insertAdjacentHTML('afterbegin', newClassHTML);
            
            // Animasyonu tetikle
            setTimeout(() => {
                document.getElementById(`class-${randomCode}`).classList.remove('opacity-0', '-translate-y-4');
            }, 50);

            // Modalı kapat, Inputu temizle ve Bilgi ver
            closeModal('createClassModal');
            document.getElementById('classNameInput').value = '';
            showToast(`${name} başarıyla oluşturuldu! Sınıf Kodu: ${randomCode}`);
        }
    </script>
</body>
</html>
